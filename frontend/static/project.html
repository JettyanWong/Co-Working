<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目 - Coworking</title>
    <link rel="stylesheet" href="/static/css/industrial-ui.css">
    <style>
        .project-page {
            width: min(1420px, 100%);
            margin: 0 auto;
            padding: 1rem;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .project-panel {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .project-panel__kicker {
            margin: 0;
            color: var(--ui-muted);
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-size: 0.68rem;
        }

        .project-panel__title {
            margin: 0.25rem 0 0;
        }

        .project-panel__meta {
            margin: 0.25rem 0 0;
            color: var(--ui-muted);
            line-height: 1.5;
        }

        .project-panel .table-shell {
            overflow-x: auto;
        }

        .file-toolbar {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) auto;
            gap: 0.75rem;
            align-items: center;
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 28px;
            padding: 0.35rem 0.72rem;
            border: 1px solid rgba(153, 180, 214, 0.2);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--ui-text);
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .role-badge.owner {
            color: #ffd9ab;
            border-color: rgba(255, 191, 115, 0.32);
            background: rgba(255, 191, 115, 0.1);
        }

        .role-badge.admin {
            color: var(--ui-accent-strong);
            border-color: rgba(121, 199, 255, 0.3);
            background: rgba(121, 199, 255, 0.1);
        }

        .role-badge.member {
            color: #b7e5a5;
            border-color: rgba(151, 208, 127, 0.3);
            background: rgba(151, 208, 127, 0.1);
        }

        .role-badge.viewer {
            color: var(--ui-muted);
        }

        .user-search {
            margin-bottom: 0.8rem;
        }

        .user-list {
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid rgba(153, 180, 214, 0.18);
            border-radius: var(--ui-radius-sm);
            background: rgba(7, 10, 14, 0.5);
        }

        .user-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.8rem 0.95rem;
            border-bottom: 1px solid rgba(153, 180, 214, 0.1);
            color: var(--ui-text);
            cursor: pointer;
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .user-item:hover,
        .user-item.selected {
            background: rgba(121, 199, 255, 0.08);
        }

        .user-item span[style],
        #membersTable span[style] {
            color: var(--ui-muted) !important;
        }

        #membersTable span[style*="#4a90d9"] {
            color: var(--ui-accent-strong) !important;
        }

        #membersTable select {
            min-height: 36px;
            padding: 0.45rem 0.7rem !important;
            border-color: rgba(153, 180, 214, 0.18) !important;
            border-radius: 10px !important;
        }

        .modal .modal-content {
            width: min(100%, 460px);
        }

        .modal .modal-content h3 {
            margin: 0 0 1rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .task-detail-grid {
            display: grid;
            grid-template-columns: minmax(120px, 160px) minmax(0, 1fr);
            gap: 0.75rem 1rem;
        }

        .task-detail-label {
            color: var(--ui-muted);
        }

        .task-detail-value {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .modal-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        @media (max-width: 980px) {
            .project-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 720px) {
            .project-page {
                padding: 0.75rem;
            }

            .file-toolbar {
                grid-template-columns: 1fr;
            }

            .modal-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header class="shell-header">
        <div class="shell-header__brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
                <p class="eyebrow">Project Detail</p>
                <h1 id="projectName">项目</h1>
            </div>
        </div>
        <nav class="shell-header__meta" aria-label="项目导航">
            <a class="btn btn-ghost" href="/static/index.html">← 项目列表</a>
            <a class="btn btn-ghost" href="/static/index.html">返回首页</a>
        </nav>
    </header>

    <main class="page-shell project-page">
        <div class="project-grid">
        <!-- Tasks Section -->
            <section class="card project-panel">
                <div class="card-head">
                    <div>
                        <p class="project-panel__kicker">Task Bay</p>
                        <h2 class="project-panel__title">任务</h2>
                        <p class="project-panel__meta">追踪认领、负责人和完成状态。</p>
                    </div>
                    <button class="btn btn-primary" onclick="showTaskModal()">+ 添加任务</button>
                </div>
                <div class="table-shell panel--inset">
                    <table>
                        <thead>
                            <tr><th>任务</th><th>状态</th><th>负责人</th><th>操作</th></tr>
                        </thead>
                        <tbody id="tasksTable"></tbody>
                    </table>
                </div>
            </section>

        <!-- Documents Section -->
            <section class="card project-panel">
                <div class="card-head">
                    <div>
                        <p class="project-panel__kicker">Document Vault</p>
                        <h2 class="project-panel__title">文档</h2>
                        <p class="project-panel__meta">项目文档入口和编辑控制台。</p>
                    </div>
                    <button class="btn btn-primary" onclick="showDocModal()">+ 创建文档</button>
                </div>
                <div class="table-shell panel--inset">
                    <table>
                        <thead>
                            <tr><th>标题</th><th>创建人</th><th>创建时间</th><th>操作</th></tr>
                        </thead>
                        <tbody id="documentsTable"></tbody>
                    </table>
                </div>
            </section>

        <!-- Files Section -->
            <section class="card project-panel">
                <div class="card-head">
                    <div>
                        <p class="project-panel__kicker">File Rack</p>
                        <h2 class="project-panel__title">文件</h2>
                        <p class="project-panel__meta">上传、查看和下载项目附件。</p>
                    </div>
                </div>
                <div class="file-toolbar">
                    <input type="file" id="fileInput">
                    <button class="btn btn-primary" onclick="uploadFile()">上传</button>
                </div>
                <div class="table-shell panel--inset">
                    <table>
                        <thead>
                            <tr><th>文件名</th><th>大小</th><th>上传者</th><th>上传时间</th><th>最后编辑</th><th>操作</th></tr>
                        </thead>
                        <tbody id="filesTable"></tbody>
                    </table>
                </div>
            </section>

        <!-- Members Section -->
            <section class="card project-panel">
                <div class="card-head">
                    <div>
                        <p class="project-panel__kicker">Crew Access</p>
                        <h2 class="project-panel__title">成员</h2>
                        <p class="project-panel__meta">维护成员角色和项目访问权限。</p>
                    </div>
                    <button class="btn btn-primary" id="addMemberBtn" onclick="showMemberModal()" style="display:none;">+ 添加成员</button>
                </div>
                <div class="table-shell panel--inset">
                    <table>
                        <thead>
                            <tr><th>用户名</th><th>角色</th><th>加入时间</th><th>操作</th></tr>
                        </thead>
                        <tbody id="membersTable"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- Task Modal -->
    <div id="taskModal" class="modal">
        <div class="modal-content card">
            <h3>添加任务</h3>
            <div class="form-group">
                <label>任务名称</label>
                <input type="text" id="taskTitle">
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="taskDesc" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>负责人</label>
                <select id="taskAssignee" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;">
                    <option value="">不指定</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="closeTaskModal()">取消</button>
                <button class="btn" onclick="createTask()">创建</button>
            </div>
        </div>
    </div>

    <!-- Task Detail Modal -->
    <div id="taskDetailModal" class="modal">
        <div class="modal-content card" style="width:min(100%,640px);">
            <div class="card-head" style="margin-bottom:1rem;">
                <div>
                    <p class="eyebrow">Task Detail</p>
                    <h3 id="taskDetailHeading" style="margin:0;">任务详情</h3>
                </div>
                <button type="button" class="btn btn-ghost" onclick="closeTaskDetailModal()" aria-label="关闭">✕</button>
            </div>
            <dl class="task-detail-grid">
                <dt class="task-detail-label">标题</dt>
                <dd id="taskDetailTitle" class="task-detail-value">-</dd>
                <dt class="task-detail-label">描述</dt>
                <dd id="taskDetailDescription" class="task-detail-value">-</dd>
                <dt class="task-detail-label">状态</dt>
                <dd id="taskDetailStatus" class="task-detail-value">-</dd>
                <dt class="task-detail-label">负责人</dt>
                <dd id="taskDetailAssignee" class="task-detail-value">-</dd>
                <dt class="task-detail-label">创建人</dt>
                <dd id="taskDetailCreator" class="task-detail-value">-</dd>
                <dt class="task-detail-label">创建时间</dt>
                <dd id="taskDetailCreatedAt" class="task-detail-value">-</dd>
                <dt class="task-detail-label">完成时间</dt>
                <dd id="taskDetailCompletedAt" class="task-detail-value">-</dd>
            </dl>
            <div class="modal-actions">
                <button class="btn btn-danger" type="button" onclick="closeTaskDetailModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- Document Modal -->
    <div id="docModal" class="modal">
        <div class="modal-content card">
            <h3>创建文档</h3>
            <div class="form-group">
                <label>文档标题</label>
                <input type="text" id="docTitle">
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="closeDocModal()">取消</button>
                <button class="btn" onclick="createDocument()">创建</button>
            </div>
        </div>
    </div>

    <!-- Member Modal -->
    <div id="memberModal" class="modal">
        <div class="modal-content card" style="width:450px;">
            <h3>添加成员</h3>
            <input type="text" class="user-search" id="userSearch" placeholder="搜索用户..." oninput="searchUsers()">
            <div class="user-list" id="userList"></div>
            <div class="form-group" style="margin-top:10px;">
                <label>角色</label>
                <select id="memberRole" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:4px;">
                    <option value="member">成员</option>
                    <option value="admin">管理员</option>
                    <option value="viewer">观察者</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="closeMemberModal()">取消</button>
                <button class="btn" onclick="addMember()">添加</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let projectId = null;
        let projectOwnerId = null;

        // Login check
        const userJson = localStorage.getItem('user');
        if (!userJson) {
            window.location.href = '/login.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        projectId = urlParams.get('id');

        if (!projectId) {
            alert('No project ID');
            window.location.href = '/static/index.html';
        }

        async function api(endpoint, options = {}) {
            const res = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...options.headers }
            });
            return res;
        }

        async function loadProject() {
            const res = await api(`/projects/${projectId}`);
            const data = await res.json();
            projectOwnerId = data.project.owner_id;
            document.getElementById('projectName').textContent = data.project.name;
            document.title = data.project.name + ' - Coworking';
            loadTasks();
            loadDocuments();
            loadFiles();
            loadMembers();
        }

        async function loadTasks() {
            const res = await api(`/projects/${projectId}/tasks`);
            const data = await res.json();
            const tbody = document.getElementById('tasksTable');
            const currentUid = getCurrentUserId();
            tbody.innerHTML = data.tasks.map(t => {
                const canComplete = (t.assignee_id === currentUid || projectOwnerId === currentUid) && t.status !== 'completed';
                const canDelete = t.created_by === currentUid || projectOwnerId === currentUid;
                return `
                <tr>
                    <td>${t.title}</td>
                    <td><span class="status ${t.status}">${t.status === 'in_progress' ? '进行中' : t.status === 'completed' ? '已完成' : '待处理'}</span></td>
                    <td>${t.assignee || '-'}</td>
                    <td>
                        <button class="btn" onclick="showTaskDetail(${t.id})">详情</button>
                        ${!t.assignee_id ? '<button class="btn" onclick="claimTask(' + t.id + ')">认领</button>' : ''}
                        ${canComplete ? '<button class="btn" onclick="completeTask(' + t.id + ')" style="margin-left:5px;">完成</button>' : ''}
                        ${canDelete ? '<button class="btn btn-danger" onclick="deleteTask(' + t.id + ')" style="margin-left:5px;">删除</button>' : ''}
                    </td>
                </tr>
            `}).join('');
        }

        function getCurrentUserId() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            return user.id;
        }

        function formatTaskStatus(status) {
            if (status === 'in_progress') return '进行中';
            if (status === 'completed') return '已完成';
            return '待处理';
        }

        function formatTaskDate(value) {
            return value ? new Date(value).toLocaleString('zh-CN') : '-';
        }

        function closeTaskDetailModal() {
            document.getElementById('taskDetailModal').classList.remove('show');
        }

        async function showTaskDetail(taskId) {
            const res = await api(`/tasks/${taskId}`);
            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                alert(data.error || '加载任务详情失败');
                return;
            }

            const data = await res.json();
            const task = data.task || {};
            document.getElementById('taskDetailHeading').textContent = task.title || '任务详情';
            document.getElementById('taskDetailTitle').textContent = task.title || '-';
            document.getElementById('taskDetailDescription').textContent = task.description || '无';
            document.getElementById('taskDetailStatus').innerHTML = `<span class="status ${task.status || 'pending'}">${formatTaskStatus(task.status)}</span>`;
            document.getElementById('taskDetailAssignee').textContent = task.assignee || '未指派';
            document.getElementById('taskDetailCreator').textContent = task.creator || '-';
            document.getElementById('taskDetailCreatedAt').textContent = formatTaskDate(task.created_at);
            document.getElementById('taskDetailCompletedAt').textContent = task.completed_at ? formatTaskDate(task.completed_at) : '未完成';
            document.getElementById('taskDetailModal').classList.add('show');
        }

        async function showTaskModal() {
            document.getElementById('taskModal').classList.add('show');
            // Populate assignee dropdown with project members
            const select = document.getElementById('taskAssignee');
            select.innerHTML = '<option value="">不指定</option>';
            try {
                const res = await api(`/projects/${projectId}/members`);
                const data = await res.json();
                (data.members || []).forEach(m => {
                    select.innerHTML += `<option value="${m.user_id}">${m.username} (${m.role})</option>`;
                });
            } catch (e) { /* ignore */ }
        }

        function closeTaskModal() {
            document.getElementById('taskModal').classList.remove('show');
        }

        async function createTask() {
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDesc').value;
            const assigneeId = document.getElementById('taskAssignee').value;
            const body = { title, description };
            if (assigneeId) body.assignee_id = parseInt(assigneeId);
            const res = await api(`/projects/${projectId}/tasks`, {
                method: 'POST',
                body: JSON.stringify(body)
            });
            if (res.ok) {
                closeTaskModal();
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskDesc').value = '';
                document.getElementById('taskAssignee').value = '';
                loadTasks();
            } else {
                const data = await res.json();
                alert(data.error || '创建失败');
            }
        }

        async function claimTask(taskId) {
            const res = await api(`/tasks/${taskId}/claim`, { method: 'POST' });
            if (res.ok) {
                loadTasks();
            } else {
                const data = await res.json();
                alert(data.error || '操作失败');
            }
        }

        async function completeTask(taskId) {
            const res = await api(`/tasks/${taskId}/complete`, { method: 'POST' });
            if (res.ok) {
                loadTasks();
            } else {
                const data = await res.json();
                alert(data.error || '操作失败');
            }
        }

        async function loadDocuments() {
            const res = await api(`/projects/${projectId}/documents`);
            const data = await res.json();
            const tbody = document.getElementById('documentsTable');
            if (!tbody) return;
            tbody.innerHTML = data.documents && data.documents.length ? data.documents.map(d => `
                <tr>
                    <td>${d.title}</td>
                    <td>${d.owner || '-'}</td>
                    <td>${d.created_at ? new Date(d.created_at).toLocaleString('zh-CN') : '-'}</td>
                    <td>
                        <button class="btn" onclick="editDoc(${d.id})">查看</button>
                        ${d.owner_id === getCurrentUserId() ? '<button class="btn btn-danger" onclick="deleteDocument(' + d.id + ')" style="margin-left:5px;">删除</button>' : ''}
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="4" style="color:#666;">暂无文档</td></tr>';
        }

        function showDocModal() {
            document.getElementById('docModal').classList.add('show');
        }

        function closeDocModal() {
            document.getElementById('docModal').classList.remove('show');
        }

        async function createDocument() {
            const title = document.getElementById('docTitle').value;
            const res = await api(`/documents`, {
                method: 'POST',
                body: JSON.stringify({ title, project_id: parseInt(projectId) })
            });
            if (res.ok) {
                const data = await res.json();
                closeDocModal();
                document.getElementById('docTitle').value = '';
                window.location.href = '/static/editor.html?id=' + data.document.id;
            } else {
                const data = await res.json();
                alert(data.error || '创建失败');
            }
        }

        function editDoc(docId) {
            window.location.href = `/static/editor.html?id=${docId}`;
        }

        async function loadFiles() {
            const res = await api(`/projects/${projectId}/files`);
            const data = await res.json();
            const tbody = document.getElementById('filesTable');
            tbody.innerHTML = data.files.map(f => `
                <tr>
                    <td>${f.filename}</td>
                    <td>${(f.size / 1024).toFixed(1)} KB</td>
                    <td>${f.uploader || '-'}</td>
                    <td>${f.created_at ? new Date(f.created_at).toLocaleString('zh-CN') : '-'}</td>
                    <td>${f.updated_at ? new Date(f.updated_at).toLocaleString('zh-CN') : '-'}</td>
                    <td>
                        <button class="btn" onclick="viewFile(${f.id})">查看</button>
                        <button class="btn" onclick="downloadFile(${f.id})">下载</button>
                        ${f.uploader_id === getCurrentUserId() ? '<button class="btn btn-danger" onclick="deleteFile(' + f.id + ')" style="margin-left:5px;">删除</button>' : ''}
                    </td>
                </tr>
            `).join('');
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) { alert('请选择文件'); return; }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('project_id', projectId);

            const res = await fetch(`${API_BASE}/files`, {
                method: 'POST',
                body: formData
            });
            if (res.ok) {
                fileInput.value = '';
                loadFiles();
            } else {
                const data = await res.json();
                alert(data.error || '上传失败');
            }
        }

        function viewFile(fileId) {
            window.open(`/static/file-view.html?id=${fileId}`);
        }

        function downloadFile(fileId) {
            window.open(`${API_BASE}/files/${fileId}/download`);
        }

        async function deleteTask(taskId) {
            if (!confirm('确定要删除该任务吗？')) return;
            const res = await api(`/tasks/${taskId}`, { method: 'DELETE' });
            if (res.ok) {
                loadTasks();
            } else {
                const data = await res.json();
                alert(data.error || '删除失败');
            }
        }

        async function deleteDocument(docId) {
            if (!confirm('确定要删除该文档吗？此操作不可撤销。')) return;
            const res = await api(`/documents/${docId}`, { method: 'DELETE' });
            if (res.ok) {
                loadDocuments();
            } else {
                const data = await res.json();
                alert(data.error || '删除失败');
            }
        }

        async function deleteFile(fileId) {
            if (!confirm('确定要删除该文件吗？')) return;
            const res = await api(`/files/${fileId}`, { method: 'DELETE' });
            if (res.ok) {
                loadFiles();
            } else {
                const data = await res.json();
                alert(data.error || '删除失败');
            }
        }

        // ---- Member management ----
        let currentUserRole = null;
        let selectedUserId = null;

        async function loadMembers() {
            const res = await api(`/projects/${projectId}/members`);
            const data = await res.json();
            const members = data.members || [];
            const currentUid = getCurrentUserId();
            // Find current user's role
            const me = members.find(m => m.user_id === currentUid);
            currentUserRole = me ? me.role : null;
            // Show/hide add member button for owner/admin
            const addBtn = document.getElementById('addMemberBtn');
            if (currentUserRole === 'owner' || currentUserRole === 'admin') {
                addBtn.style.display = '';
            } else {
                addBtn.style.display = 'none';
            }
            const tbody = document.getElementById('membersTable');
            tbody.innerHTML = members.map(m => {
                const roleLabel = {owner:'拥有者',admin:'管理员',member:'成员',viewer:'观察者'}[m.role] || m.role;
                const canManage = (currentUserRole === 'owner' || currentUserRole === 'admin') && m.role !== 'owner';
                const canRemove = currentUserRole === 'owner' && m.role !== 'owner';
                let actions = '';
                if (canManage) {
                    actions += `<select onchange="changeRole(${m.user_id}, this.value)" style="padding:4px;border:1px solid #ddd;border-radius:4px;">
                        <option value="">修改角色</option>
                        <option value="admin">管理员</option>
                        <option value="member">成员</option>
                        <option value="viewer">观察者</option>
                    </select> `;
                }
                if (canRemove) {
                    actions += `<button class="btn btn-danger" onclick="removeMember(${m.user_id})" style="padding:4px 8px;font-size:12px;">移除</button>`;
                }
                if (!actions) actions = '-';
                return `<tr>
                    <td>${m.username}${m.user_id === projectOwnerId ? ' <span style="color:#4a90d9;font-size:11px;">(拥有者)</span>' : ''}</td>
                    <td><span class="role-badge ${m.role}">${roleLabel}</span></td>
                    <td>${m.joined_at ? new Date(m.joined_at).toLocaleString('zh-CN') : '-'}</td>
                    <td>${actions}</td>
                </tr>`;
            }).join('');
            // Also refresh the task assignee dropdown
            const select = document.getElementById('taskAssignee');
            if (select) {
                select.innerHTML = '<option value="">不指定</option>';
                members.forEach(m => {
                    select.innerHTML += `<option value="${m.user_id}">${m.username} (${m.role})</option>`;
                });
            }
        }

        function showMemberModal() {
            document.getElementById('memberModal').classList.add('show');
            document.getElementById('userSearch').value = '';
            document.getElementById('memberRole').value = 'member';
            selectedUserId = null;
            searchUsers();
        }

        function closeMemberModal() {
            document.getElementById('memberModal').classList.remove('show');
        }

        async function searchUsers() {
            const q = document.getElementById('userSearch').value;
            const res = await api(`/users/search?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            // Filter out existing members
            const membersRes = await api(`/projects/${projectId}/members`);
            const membersData = await membersRes.json();
            const existingIds = new Set((membersData.members || []).map(m => m.user_id));
            const available = (data.users || []).filter(u => !existingIds.has(u.id));
            const list = document.getElementById('userList');
            if (available.length === 0) {
                list.innerHTML = '<div class="user-item" style="color:#666;">没有找到可添加的用户</div>';
            } else {
                list.innerHTML = available.map(u => `<div class="user-item${selectedUserId === u.id ? ' selected' : ''}" onclick="selectUser(${u.id}, '${u.username}')">
                    <span>${u.username}</span><span style="color:#666;font-size:12px;">${u.email || ''}</span>
                </div>`).join('');
            }
        }

        function selectUser(uid, username) {
            selectedUserId = uid;
            document.getElementById('userSearch').value = username;
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('selected'));
            // Find and highlight the clicked item
            const items = document.querySelectorAll('.user-item');
            items.forEach(el => { if (el.textContent.includes(username)) el.classList.add('selected'); });
        }

        async function addMember() {
            if (!selectedUserId) { alert('请先选择用户'); return; }
            const role = document.getElementById('memberRole').value;
            const res = await api(`/projects/${projectId}/members`, {
                method: 'POST',
                body: JSON.stringify({ user_id: selectedUserId, role })
            });
            if (res.ok) {
                closeMemberModal();
                loadMembers();
            } else {
                const data = await res.json();
                alert(data.error || '添加失败');
            }
        }

        async function removeMember(userId) {
            const name = document.querySelector(`#membersTable tr td`) ? '' : '';
            if (!confirm('确定要移除该成员吗？')) return;
            const res = await api(`/projects/${projectId}/members/${userId}`, { method: 'DELETE' });
            if (res.ok) {
                loadMembers();
            } else {
                const data = await res.json();
                alert(data.error || '移除失败');
            }
        }

        async function changeRole(userId, newRole) {
            if (!newRole) return;
            if (!confirm(`确定要修改该成员的角色为 "${newRole}" 吗？`)) {
                loadMembers(); // Reset the select
                return;
            }
            const res = await api(`/projects/${projectId}/members/${userId}`, {
                method: 'PUT',
                body: JSON.stringify({ role: newRole })
            });
            if (res.ok) {
                loadMembers();
            } else {
                const data = await res.json();
                alert(data.error || '修改失败');
                loadMembers();
            }
        }

        loadProject();
    </script>
</body>
</html>
