<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件查看 - Coworking</title>
    <link rel="stylesheet" href="/static/css/industrial-ui.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="file-view-shell">
    <header class="shell-header">
        <div class="shell-header__brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
                <p class="eyebrow">FILE VIEW BAY</p>
                <h1><a href="#" onclick="history.back(); return false;">←</a> <span id="fileName">文件查看</span></h1>
            </div>
        </div>
        <div class="shell-header__meta">
            <a href="/static/index.html">返回首页</a>
        </div>
    </header>

    <main class="file-view-container">
        <section class="preview-surface">
            <div id="content" class="loading">加载中...</div>
        </section>
    </main>

    <script>
        const API_BASE = '/api';
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');

        if (!fileId) {
            document.getElementById('content').innerHTML = '<div class="error">缺少文件 ID</div>';
        }

        const userJson = localStorage.getItem('user');
        if (!userJson) {
            window.location.href = '/login.html';
        }

        async function loadFile() {
            try {
                const res = await fetch(`${API_BASE}/files/${fileId}/view`);
                if (!res.ok) {
                    if (res.status === 401) {
                        window.location.href = '/login.html';
                        return;
                    }
                    document.getElementById('content').innerHTML = '<div class="error">无法加载文件（权限不足或文件不存在）</div>';
                    return;
                }

                const contentType = res.headers.get('Content-Type') || '';
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);

                // Get file info
                let fileInfo = null;
                try {
                    const infoRes = await fetch(`${API_BASE}/projects`);
                    const projectsData = await infoRes.json();
                    for (const p of projectsData.projects || []) {
                        try {
                            const filesRes = await fetch(`${API_BASE}/projects/${p.id}/files`);
                            if (filesRes.ok) {
                                const filesData = await filesRes.json();
                                const found = (filesData.files || []).find(f => f.id === parseInt(fileId));
                                if (found) { fileInfo = found; break; }
                            }
                        } catch(e) {}
                    }
                } catch(e) {}

                let infoHtml = '<div class="file-info">';
                if (fileInfo) {
                    infoHtml += `<strong>文件名：</strong>${fileInfo.filename} &nbsp;|&nbsp; `;
                    infoHtml += `<strong>大小：</strong>${(fileInfo.size / 1024).toFixed(1)} KB &nbsp;|&nbsp; `;
                    infoHtml += `<strong>上传者：</strong>${fileInfo.uploader || '-'}`;
                }
                infoHtml += '</div>';

                let previewHtml = '';

                const isMarkdown = contentType === 'text/markdown' || contentType.includes('text/markdown') ||
                    (fileInfo && /\.(md|markdown)$/i.test(fileInfo.filename));

                if (contentType.startsWith('image/')) {
                    document.getElementById('fileName').textContent = fileInfo ? fileInfo.filename : '图片查看';
                    previewHtml = `<img src="${url}" alt="${fileInfo ? fileInfo.filename : 'Image'}">`;
                } else if (isMarkdown) {
                    document.getElementById('fileName').textContent = fileInfo ? fileInfo.filename : 'Markdown 查看';
                    const text = await blob.text();
                    const rendered = marked.parse(text);
                    previewHtml = `<div class="markdown-body">${rendered}</div>`;
                } else if (contentType.startsWith('text/') || contentType.includes('javascript') || contentType.includes('json')) {
                    document.getElementById('fileName').textContent = fileInfo ? fileInfo.filename : '文本查看';
                    const text = await blob.text();
                    previewHtml = `<pre>${escapeHtml(text)}</pre>`;
                } else if (contentType === 'application/pdf') {
                    document.getElementById('fileName').textContent = fileInfo ? fileInfo.filename : 'PDF查看';
                    previewHtml = `<iframe src="${url}"></iframe>`;
                } else {
                    document.getElementById('fileName').textContent = fileInfo ? fileInfo.filename : '文件查看';
                    previewHtml = `<div style="text-align:center;padding:40px;color:#666;">
                        <p style="font-size:48px;margin-bottom:16px;">📄</p>
                        <p>此文件类型不支持在线预览（${contentType}）</p>
                    </div>`;
                }

                document.getElementById('content').innerHTML = `
                    <div class="file-preview">
                        ${infoHtml}
                        ${previewHtml}
                        <div class="actions">
                            <a href="${url}" download="${fileInfo ? fileInfo.filename : 'file'}" class="btn btn-secondary">下载</a>
                        </div>
                    </div>`;
            } catch(e) {
                document.getElementById('content').innerHTML = '<div class="error">加载失败: ' + e.message + '</div>';
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        loadFile();
    </script>
</body>
</html>
