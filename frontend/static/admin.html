<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Coworking</title>
    <link rel="stylesheet" href="/static/css/industrial-ui.css">
</head>
<body>
    <header class="shell-header">
        <div class="shell-header__brand">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
                <p class="eyebrow">ADMIN CONTROL BAY</p>
                <h1>管理后台</h1>
            </div>
        </div>
        <div class="shell-header__meta">
            <a href="/static/index.html">返回首页</a>
        </div>
    </header>

    <main class="page-shell" style="max-width:1200px;margin:0 auto;padding:1rem;">
        <div class="tabs">
            <button class="tab active" onclick="showTab('users')">用户管理</button>
            <button class="tab" onclick="showTab('pending')">待审核 <span id="pendingCount" class="badge badge-pending">0</span></button>
        </div>

        <section id="usersTab" class="card">
            <div class="card-head">
                <div>
                    <p class="eyebrow">User Registry</p>
                    <h2>所有用户</h2>
                </div>
            </div>
            <div class="table-shell">
                <table>
                    <thead>
                        <tr><th>ID</th><th>用户名</th><th>邮箱</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th></tr>
                    </thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </section>

        <section id="pendingTab" class="card" style="display:none;">
            <div class="card-head">
                <div>
                    <p class="eyebrow">Approval Queue</p>
                    <h2>待审核用户</h2>
                </div>
            </div>
            <div class="table-shell">
                <table>
                    <thead>
                        <tr><th>ID</th><th>用户名</th><th>邮箱</th><th>注册时间</th><th>操作</th></tr>
                    </thead>
                    <tbody id="pendingTable"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_BASE = '/api';
        let allUsers = [];

        const userJson = localStorage.getItem('user');
        if (!userJson) {
            window.location.href = '/login.html';
        }
        const currentUser = JSON.parse(userJson);
        if (currentUser.role !== 'admin') {
            alert('无权访问管理后台');
            window.location.href = '/static/index.html';
        }

        async function api(endpoint, options = {}) {
            const res = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...options.headers }
            });
            return res;
        }

        async function loadUsers() {
            const res = await api('/users');
            if (!res.ok) {
                if (res.status === 403) {
                    alert('无权访问');
                    window.location.href = '/static/index.html';
                }
                return;
            }
            const data = await res.json();
            allUsers = data.users || [];
            renderAllUsers();
            renderPendingUsers();
        }

        function statusBadge(status) {
            const map = { pending: ['待审核', 'badge-pending'], active: ['正常', 'badge-active'], disabled: ['已禁用', 'badge-disabled'] };
            const [label, cls] = map[status] || [status, ''];
            return `<span class="badge ${cls}">${label}</span>`;
        }

        function roleBadge(role) {
            return `<span class="badge ${role === 'admin' ? 'badge-admin' : 'badge-member'}">${role === 'admin' ? '管理员' : '成员'}</span>`;
        }

        function renderAllUsers() {
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = allUsers.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.email}</td>
                    <td>${roleBadge(u.role)}</td>
                    <td>${statusBadge(u.status)}</td>
                    <td>${u.created_at ? new Date(u.created_at).toLocaleString('zh-CN') : '-'}</td>
                    <td>
                        ${u.id !== currentUser.id ? `
                            ${u.status === 'pending' ? `<button class="btn btn-success" onclick="approveUser(${u.id})">通过</button>
                               <button class="btn btn-danger" onclick="rejectUser(${u.id})" style="margin-left:4px;">拒绝</button>` : ''}
                            ${u.status === 'active' ? `<button class="btn btn-warning" onclick="disableUser(${u.id})">禁用</button>` : ''}
                            ${u.status === 'disabled' ? `<button class="btn btn-success" onclick="enableUser(${u.id})">启用</button>` : ''}
                            ${u.role === 'member' ? `<button class="btn btn-info" onclick="promoteUser(${u.id})" style="margin-left:4px;">升为管理员</button>` : ''}
                            ${u.role === 'admin' ? `<button class="btn btn-warning" onclick="demoteUser(${u.id})" style="margin-left:4px;">降为成员</button>` : ''}
                            <button class="btn btn-info" onclick="showResetPasswordModal(${u.id}, decodeURIComponent('${encodeURIComponent(u.username)}'))" style="margin-left:4px;">重置密码</button>
                            <button class="btn btn-danger" onclick="deleteUser(${u.id})" style="margin-left:4px;">删除</button>
                        ` : '<span style="color:#999;">当前用户</span>'}
                    </td>
                </tr>
            `).join('');
        }

        function renderPendingUsers() {
            const pending = allUsers.filter(u => u.status === 'pending');
            document.getElementById('pendingCount').textContent = pending.length;
            const tbody = document.getElementById('pendingTable');
            tbody.innerHTML = pending.length ? pending.map(u => `
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.email}</td>
                    <td>${u.created_at ? new Date(u.created_at).toLocaleString('zh-CN') : '-'}</td>
                    <td>
                        <button class="btn btn-success" onclick="approveUser(${u.id})">通过</button>
                        <button class="btn btn-danger" onclick="rejectUser(${u.id})" style="margin-left:4px;">拒绝</button>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="5" style="color:#999;text-align:center;">暂无待审核用户</td></tr>';
        }

        function showTab(tab) {
            document.getElementById('usersTab').style.display = tab === 'users' ? '' : 'none';
            document.getElementById('pendingTab').style.display = tab === 'pending' ? '' : 'none';
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'users') || (i === 1 && tab === 'pending')));
        }

        async function approveUser(userId) {
            const res = await api(`/users/${userId}/approve`, { method: 'POST' });
            if (res.ok) {
                loadUsers();
            } else {
                const data = await res.json();
                alert(data.error || '操作失败');
            }
        }

        async function rejectUser(userId) {
            if (!confirm('确定要拒绝该用户吗？此操作将删除该用户。')) return;
            const res = await api(`/users/${userId}/reject`, { method: 'POST' });
            if (res.ok) {
                loadUsers();
            } else {
                const data = await res.json();
                alert(data.error || '操作失败');
            }
        }

        async function disableUser(userId) {
            const res = await api(`/users/${userId}`, {
                method: 'PUT',
                body: JSON.stringify({ status: 'disabled' })
            });
            if (res.ok) {
                loadUsers();
            } else {
                const data = await res.json();
                alert(data.error || '操作失败');
            }
        }

        async function enableUser(userId) {
            const res = await api(`/users/${userId}`, {
                method: 'PUT',
                body: JSON.stringify({ status: 'active' })
            });
            if (res.ok) {
                loadUsers();
            } else {
                const data = await res.json();
                alert(data.error || '操作失败');
            }
        }

        async function promoteUser(userId) {
            if (!confirm('确定要将该用户提升为管理员吗？')) return;
            const res = await api(`/users/${userId}`, {
                method: 'PUT',
                body: JSON.stringify({ role: 'admin' })
            });
            if (res.ok) {
                loadUsers();
            } else {
                const data = await res.json();
                alert(data.error || '操作失败');
            }
        }

        async function demoteUser(userId) {
            if (!confirm('确定要取消该用户的管理员权限吗？')) return;
            const res = await api(`/users/${userId}`, {
                method: 'PUT',
                body: JSON.stringify({ role: 'member' })
            });
            if (res.ok) {
                loadUsers();
            } else {
                const data = await res.json();
                alert(data.error || '操作失败');
            }
        }

        async function deleteUser(userId) {
            if (!confirm('确定要删除该用户吗？此操作不可撤销。')) return;
            const res = await api(`/users/${userId}`, { method: 'DELETE' });
            if (res.ok) {
                loadUsers();
            } else {
                const data = await res.json();
                alert(data.error || '操作失败');
            }
        }

        let resetPasswordUserId = null;

        function showResetPasswordModal(userId, username) {
            resetPasswordUserId = userId;
            document.getElementById('resetPasswordUserName').textContent = username;
            document.getElementById('resetPasswordError').textContent = '';
            document.getElementById('resetPasswordNew').value = '';
            document.getElementById('resetPasswordConfirm').value = '';
            document.getElementById('resetPasswordModal').classList.add('show');
        }

        function closeResetPasswordModal() {
            resetPasswordUserId = null;
            document.getElementById('resetPasswordModal').classList.remove('show');
            document.getElementById('resetPasswordForm').reset();
            document.getElementById('resetPasswordError').textContent = '';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('resetPasswordForm');
            if (!form) return;
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = document.getElementById('resetPasswordNew').value;
                const confirmPassword = document.getElementById('resetPasswordConfirm').value;
                const errorEl = document.getElementById('resetPasswordError');

                if (!resetPasswordUserId) {
                    errorEl.textContent = '缺少目标用户';
                    return;
                }
                if (!newPassword || !confirmPassword) {
                    errorEl.textContent = '请填写全部密码字段';
                    return;
                }
                if (newPassword.length < 8) {
                    errorEl.textContent = '新密码至少 8 个字符';
                    return;
                }
                if (newPassword !== confirmPassword) {
                    errorEl.textContent = '两次输入的新密码不一致';
                    return;
                }

                const res = await api(`/users/${resetPasswordUserId}/reset-password`, {
                    method: 'POST',
                    body: JSON.stringify({ password: newPassword })
                });
                if (res.ok) {
                    await loadUsers();
                    closeResetPasswordModal();
                    alert('密码已重置成功');
                } else {
                    const data = await res.json();
                    errorEl.textContent = data.error || '重置失败';
                }
            });
        });

        loadUsers();
    </script>

    <div id="resetPasswordModal" class="modal">
        <div class="modal-content">
            <h3>重置密码</h3>
            <p style="margin-bottom:12px;color:#666;">用户：<strong id="resetPasswordUserName"></strong></p>
            <div id="resetPasswordError" class="error" style="min-height:20px;"></div>
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="resetPasswordNew">新密码</label>
                    <input type="password" id="resetPasswordNew" required>
                </div>
                <div class="form-group">
                    <label for="resetPasswordConfirm">确认新密码</label>
                    <input type="password" id="resetPasswordConfirm" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" onclick="closeResetPasswordModal()">取消</button>
                    <button type="submit" class="btn btn-info">确认重置</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
