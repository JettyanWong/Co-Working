<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Coworking</title>
    <link rel="stylesheet" href="/static/css/industrial-ui.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-brand panel panel--glow">
            <p class="eyebrow">CO-WORKING ACCESS BAY</p>
            <h1>Coworking</h1>
            <p class="lede">协作控制台，负责项目、任务、文档和文件的统一接入。登录后进入工作空间。</p>

            <div class="auth-rack">
                <div class="auth-mini-card">
                    <strong>Secure Login</strong>
                    <span>帐号通过后才能进入主舱，未审核用户会被阻挡在外。</span>
                </div>
                <div class="auth-mini-card">
                    <strong>Shared Workspace</strong>
                    <span>项目、文档和文件都在同一套机械壳体中协作。</span>
                </div>
                <div class="auth-mini-card">
                    <strong>Admin Gate</strong>
                    <span>管理员可进入审核与权限控制面板。</span>
                </div>
            </div>
        </section>

        <section class="auth-stack">
            <div class="auth-card panel panel--inset">
                <div class="card-head">
                    <div>
                        <p class="eyebrow">Crew Login</p>
                        <h2>登录</h2>
                    </div>
                </div>
                <div id="error" class="form-message" aria-live="polite"></div>
                <form id="loginForm">
                    <div class="field">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" required autocomplete="username">
                    </div>
                    <div class="field">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">登录</button>
                </form>
                <p class="toggle">没有账号？<a href="#" onclick="showRegister(); return false;">去注册</a></p>
            </div>

            <div class="auth-card panel panel--inset" id="registerCard" style="display:none;">
                <div class="card-head">
                    <div>
                        <p class="eyebrow">Register</p>
                        <h2>注册</h2>
                    </div>
                </div>
                <div id="regError" class="form-message" aria-live="polite"></div>
                <form id="registerForm">
                    <div class="field">
                        <label for="regUsername">用户名</label>
                        <input type="text" id="regUsername" name="username" required autocomplete="username">
                    </div>
                    <div class="field">
                        <label for="regEmail">邮箱</label>
                        <input type="email" id="regEmail" name="email" required autocomplete="email">
                    </div>
                    <div class="field">
                        <label for="regPassword">密码</label>
                        <input type="password" id="regPassword" name="password" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">注册</button>
                </form>
                <p class="toggle">已有账号？<a href="#" onclick="showLogin(); return false;">去登录</a></p>
            </div>
        </section>
    </main>

    <script>
        const API_BASE = '/auth';

        function showRegister() {
            document.getElementById('loginForm').parentElement.style.display = 'none';
            document.getElementById('registerCard').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('registerCard').style.display = 'none';
            document.getElementById('loginForm').parentElement.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error');

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/static/index.html';
                } else {
                    errorEl.textContent = data.error || '登录失败';
                }
            } catch (err) {
                errorEl.textContent = '网络错误';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const errorEl = document.getElementById('regError');

            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    errorEl.classList.add('success');
                    errorEl.textContent = data.message || '注册成功，请等待管理员审核';
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                    setTimeout(() => {
                        errorEl.classList.remove('success');
                        showLogin();
                    }, 2000);
                } else {
                    errorEl.textContent = data.error || '注册失败';
                }
            } catch (err) {
                errorEl.textContent = '网络错误';
            }
        });
    </script>
</body>
</html>
